name: Deploy GoClaw to VPS

on:
  push:
    branches:
      - main  # Chạy deploy tự động khi có code mới ở branch main
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kêt nối SSH và Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Bắt đầu cập nhật GoClaw trên VPS..."
            cd /opt/goclaw
            
            # Kéo code mới nhất từ branch main
            git pull origin main
            
            # Cập nhật và khởi động lại các dịch vụ (Docker Compose)
            make up
            
            echo "Deploy hoàn tất!"
