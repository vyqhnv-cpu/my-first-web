<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cảm ơn bạn — The Lifeskill Hub</title>
    <link rel="icon" href="asset/favicon.png" type="image/png" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&family=Be+Vietnam+Pro:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .thank-you-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background-color: #f9fbf9;
        padding: 2rem;
      }
      .thank-you-card {
        max-width: 600px;
        background: white;
        padding: 5rem 3rem;
        border-radius: var(--radius-sm);
        box-shadow: 0 20px 60px rgba(0,0,0,0.05);
      }
      .thank-you-card h1 {
        font-family: var(--font-serif);
        font-size: clamp(2.5rem, 5vw, 3.5rem);
        color: var(--color-primary);
        margin-bottom: 1.5rem;
      }
      .thank-you-card p {
        font-size: 1.15rem;
        color: var(--color-muted);
        line-height: 1.8;
        margin-bottom: 3rem;
      }
      .heart-icon {
        font-size: 3rem;
        color: #d68c8c;
        margin-bottom: 2rem;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="thank-you-page">
      <div class="thank-you-card">
        <span class="heart-icon">❤️</span>
        <h1>Cảm ơn bạn!</h1>
        <p>
          Mọi chia sẻ của bạn đã được chúng mình trân trọng ghi nhận. <br />
          Bạn đã chính thức gia nhập <strong>Waitlist</strong> của The Lifeskill Hub. 
          Chúng mình sẽ sớm kết nối với bạn qua Zalo/Email để đồng hành cùng bạn trên hành trình thấu hiểu này.
        </p>
        <a href="index.html" class="btn-primary">Quay lại trang chủ</a>
      </div>
    </div>
  </body>
</html>
